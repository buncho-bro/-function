<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>殺戮関数 - 完全版</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #e8e6da; color: #333; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; touch-action: manipulation;
        }
        .screen { display: none; width: 100%; height: 100%; position: relative; overflow-y: auto; padding: 20px; }
        .active-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        canvas { 
            background: #f4f2e8; border: 2px solid #888; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1); 
            max-width: 100vw; max-height: 100vh; 
            object-fit: contain; 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        
        .menu-container {
            width: 100%; max-width: 750px; min-height: 100%;
            background: #f4f2e8; border: 2px solid #888; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; margin: auto; border-radius: 8px;
        }
        
        h1.title-logo { 
            font-size: clamp(32px, 10vw, 64px); 
            margin: 0 0 30px 0; color: #333; border-bottom: 4px dashed #888; 
            padding-bottom: 10px; letter-spacing: 5px; text-align: center;
        }
        h2 { color: #333; border-bottom: 2px dashed #888; padding-bottom: 10px; width: 100%; text-align: center; font-size: clamp(20px, 6vw, 24px); margin-top: 0;}
        
        .btn {
            display: block; width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; 
            background: #f0eee4; border: 2px solid #888; color: #333; cursor: pointer; 
            text-align: center; font-size: 16px; font-weight: bold; transition: all 0.1s;
            border-radius: 4px; appearance: none;
        }
        @media (hover: hover) {
            .btn:hover:not(:disabled) { background: #e0dec4; border-color: #333; }
            .option-btn:hover { background: #e0dec4; }
        }
        .btn:active:not(:disabled), .option-btn:active { background: #d0ceb4; transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .back-btn { margin-top: 20px; background: #ddd; }

        /* キャラクターカード */
        .char-select-container { display: flex; gap: 20px; width: 100%; justify-content: center; flex-wrap: wrap; margin-bottom: 15px;}
        .char-card {
            flex: 1; min-width: 280px; padding: 20px; border-radius: 8px; text-align: left;
            display: flex; flex-direction: column; transition: transform 0.2s;
        }
        .char-card.eq { background: #fffdf5; border: 2px solid #ccc; }
        .char-card.ineq { background: #f0f8ff; border: 2px solid #a0c8e0; }
        .char-card h3 { text-align: center; margin-top: 0; font-size: 22px; }
        .char-card p { font-size: 13px; line-height: 1.6; flex-grow: 1; margin: 10px 0 20px 0; }
        .char-card .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; margin-bottom: 10px; width: 100%; text-align: center;}

        /* 呪いUI */
        .curse-container {
            margin-bottom: 20px; background: #f0eee4; padding: 15px; border: 2px solid #888; border-radius: 8px; width: 100%; max-width: 580px; text-align: center;
        }

        /* ゲーム内UI */
        #game-ui { 
            position: absolute; top: 10px; left: 10px; pointer-events: none; 
            width: calc(100% - 20px); max-width: 350px; z-index: 10;
            background: rgba(244, 242, 232, 0.9); 
            padding: 8px; border-radius: 8px; border: 1px solid rgba(136, 136, 136, 0.5);
            max-height: 40vh; display: flex; flex-direction: column;
        }
        #ui-scroll-area { overflow-y: auto; pointer-events: auto; flex-grow: 1; margin-top: 5px; }
        .bar-container { width: 100%; height: 8px; background: #ddd; margin-bottom: 4px; border: 1px solid #888; flex-shrink: 0; }
        #hp-bar { height: 100%; background: #d66060; transition: width 0.2s; } 
        #xp-bar { height: 100%; background: #60d6a0; transition: width 0.2s; } 

        /* リスト表示 */
        .list-container { width: 100%; flex-grow: 1; max-height: 50vh; overflow-y: auto; text-align: left; padding: 10px; border: 1px solid #ccc; background: #fffdf5; }
        .list-item { border-bottom: 1px dashed #ccc; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        
        .type-badge { display: inline-block; padding: 3px 6px; background: #90a0d0; color: #fff; font-size: 10px; margin-right: 8px; border-radius: 2px; font-weight: bold; }
        .type-badge.stat { background: #d0a060; }
        .type-badge.target { background: #80c090; }
        .type-badge.target-mod { background: #e09040; }
        
        #level-up-modal, #game-over-modal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #fcfaf2; padding: 20px; border: 3px solid #666; display: none; text-align: center; 
            pointer-events: auto; width: 95%; max-width: 420px; max-height: 90vh; overflow-y: auto; z-index: 100;
            border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; background: #f0eee4; border: 2px solid #888; color: #333; cursor: pointer; text-align: left; border-radius: 4px; }
        #reroll-btn { background: #4a90e2; color: #fff; font-weight: bold; border-color: #357abd; }
    </style>
</head>
<body>

    <div id="title-screen" class="screen active-screen">
        <div class="menu-container">
            <h1 class="title-logo">殺戮関数</h1>
            <button class="btn" onclick="showScreen('char-select-screen')">ゲームを始める</button>
            <button class="btn" onclick="showScreen('upgrade-screen'); updateUpgradeUI();">自分の強化</button>
            <button class="btn" onclick="showScreen('encyclopedia-screen'); initEncyclopedia('eq');">関数の図鑑</button>
        </div>
    </div>

    <div id="char-select-screen" class="screen">
        <div class="menu-container">
            <h2>キャラクター選択</h2>
            <div class="char-select-container">
                <div class="char-card eq">
                    <h3><span style="font-size: 28px;">＝</span> 等号キャラ</h3>
                    <div class="badge" style="background:#e0e0e0">軌道描画・単体火力</div>
                    <p>数式の「線」を描画して攻撃します。一撃が重く、幾何学的な弾幕で敵を切り裂くのが得意です。</p>
                    <button class="btn" style="width:100%; margin:0;" onclick="startGame('eq')">出撃する</button>
                </div>
                <div class="char-card ineq">
                    <h3 style="color:#285e8e;"><span style="font-size: 28px;">＜</span> 不等号キャラ</h3>
                    <div class="badge" style="background:#cce0ff; color:#285e8e;">領域展開・持続制圧</div>
                    <p>数式の「面」を塗りつぶして攻撃します。広範囲にダメージゾーンを作り、敵をじわじわと消滅させます。</p>
                    <button class="btn" style="width:100%; margin:0; background:#4a90e2; color:#fff; border-color:#357abd;" onclick="startGame('ineq')">出撃する</button>
                </div>
            </div>
            
            <div class="curse-container">
                <div style="font-weight: bold; margin-bottom: 10px; color: #503030;">💀 呪いレベル (0〜100)</div>
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <button class="btn" style="width: 50px; padding: 10px; margin: 0;" onclick="changeCurse(-10)">-10</button>
                    <span id="curse-display" style="font-size: 24px; font-weight: bold; width: 50px;">0</span>
                    <button class="btn" style="width: 50px; padding: 10px; margin: 0;" onclick="changeCurse(10)">+10</button>
                </div>
                <div style="font-size: 11px; color: #666; margin-top: 8px;">難易度と獲得XPがレベル分だけ上昇します</div>
            </div>
            <button class="btn back-btn" onclick="showScreen('title-screen')">戻る</button>
        </div>
    </div>

    <div id="upgrade-screen" class="screen">
        <div class="menu-container">
            <h2>永続強化</h2>
            <div style="font-weight:bold; color:#8a6d50; margin-bottom:10px;">所持XP: <span id="global-xp-val">0</span></div>
            <div class="list-container" id="upgrade-list"></div>
            <button class="btn back-btn" onclick="showScreen('title-screen')">戻る</button>
        </div>
    </div>

    <div id="encyclopedia-screen" class="screen">
        <div class="menu-container">
            <h2>数式図鑑</h2>
            <div style="display:flex; gap:10px; width:100%; margin-bottom:10px;">
                <button class="btn" style="margin:0" onclick="initEncyclopedia('eq')">等号</button>
                <button class="btn" style="margin:0" onclick="initEncyclopedia('ineq')">不等号</button>
            </div>
            <div class="list-container" id="dict-list"></div>
            <button class="btn back-btn" onclick="showScreen('title-screen')">戻る</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="padding:0; overflow:hidden;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="game-ui">
            <div style="font-size:12px; font-weight:bold;">Lv:<span id="lv-val">1</span> | <span id="time-val">0:00</span> | 💀<span id="curse-val">0</span></div>
            <div class="bar-container"><div id="hp-bar" style="width:100%"></div></div>
            <div class="bar-container"><div id="xp-bar" style="width:0%"></div></div>
            <div id="ui-scroll-area">
                <div id="stats-list" style="font-size:10px; font-weight:bold; color:#8a6d50; margin-bottom:4px;"></div>
                <div id="formula-list" style="font-size:10px; color:#444; border-top:1px solid #ccc; padding-top:4px;"></div>
            </div>
        </div>

        <div id="level-up-modal">
            <h2 id="modal-title">LEVEL UP!</h2>
            <div id="options"></div>
            <button id="reroll-btn" class="option-btn">リロール</button>
            <button id="remove-btn" class="option-btn" style="background:#d88; display:none;">要素を削除する</button>
        </div>

        <div id="game-over-modal">
            <h2 id="go-title">GAME OVER</h2>
            <p id="result-stats" style="font-size:14px;"></p>
            <button class="btn" style="margin:20px auto;" onclick="returnToTitle()">タイトルへ</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let animationId, lastFrameTime = 0, pointerCoords = { x: 400, y: 300 };

        function updatePointer(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            pointerCoords.x = (clientX - rect.left) * (800 / rect.width);
            pointerCoords.y = (clientY - rect.top) * (600 / rect.height);
        }
        window.addEventListener('mousemove', updatePointer);
        window.addEventListener('touchstart', updatePointer, {passive:false});
        window.addEventListener('touchmove', updatePointer, {passive:false});

        let globalData = { xp: 0, curse: 0, upgrades: { hp: 0, atk: 0, spd: 0, reroll: 0 } };
        function loadData() { 
            const saved = localStorage.getItem('satsuriku-v2');
            if (saved) {
                const parsed = JSON.parse(saved);
                globalData.xp = parsed.xp || 0;
                globalData.curse = parsed.curse || 0;
                if (parsed.upgrades) Object.assign(globalData.upgrades, parsed.upgrades);
            }
        }
        function saveData() { localStorage.setItem('satsuriku-v2', JSON.stringify(globalData)); }
        loadData();

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active-screen', s.id === id));
        }

        function changeCurse(v) { globalData.curse = Math.max(0, Math.min(100, globalData.curse + v)); updateCurseUI(); saveData(); }
        function updateCurseUI() { document.getElementById('curse-display').innerText = globalData.curse; }
        updateCurseUI();

        // 報酬データ
        const upEq = [
            { type: "variable", name: "最寄りの敵 (CLO)", code: "CLO", desc: "一番近い敵を狙う" },
            { type: "variable", name: "ランダム (RAN)", code: "RAN", desc: "ランダムな敵を狙う" },
            { type: "variable", name: "ポインタ (PTR)", code: "PTR", desc: "指の位置を狙う" },
            { type: "target_mod", name: "射出 (Launch)", code: "LAUNCH", desc: "攻撃を自分から飛ばす" },
            { type: "formula", name: "円 (Circle)", code: "CIRCLE", desc: "基本形状を円にする" },
            { type: "formula", name: "バラ (Rose)", code: "ROSE", desc: "幾何学的な花びら型" },
            { type: "formula", name: "波 (Sine)", code: "Math.sin(x/20)*40", desc: "波状の動きを加える" },
            { type: "modifier", name: "積分 (∫)", code: "INT", desc: "威力とサイズを大幅UP" },
            { type: "modifier", name: "虚数 (i)", code: "IMG", desc: "弱体化させる影を出す" },
            { type: "stat", name: "威力増加", code: "ATK_UP", action: () => gameState.player.damage += 0.2 }
        ];

        const upIneq = [
            { type: "variable", name: "最寄りの敵 (CLO)", code: "CLO" },
            { type: "variable", name: "ポインタ (PTR)", code: "PTR" },
            { type: "target_mod", name: "射出 (Launch)", code: "LAUNCH" },
            { type: "base", name: "円形領域", code: "BASE_CIRCLE", desc: "周囲を塗りつぶす" },
            { type: "formula", name: "Sine 波面", code: "SIN_AREA", desc: "境界が波打つ" },
            { type: "formula", name: "Step 階段", code: "STEP_AREA", desc: "境界がカクつく" },
            { type: "modifier", name: "持続化 (Persist)", code: "PERSIST", desc: "領域が長く残る" },
            { type: "modifier", name: "帯域化 (Band)", code: "BAND", desc: "境界のみを強化" },
            { type: "stat", name: "威力増加", code: "ATK_UP", action: () => gameState.player.damage += 0.1 }
        ];

        function initEncyclopedia(t) {
            const l = document.getElementById('dict-list'); l.innerHTML = '';
            (t === 'eq' ? upEq : upIneq).forEach(u => {
                if(u.type==='stat') return;
                l.innerHTML += `<div class="list-item"><div><span class="type-badge">${u.type}</span><b>${u.name}</b></div><small>${u.desc||''}</small></div>`;
            });
        }

        function updateUpgradeUI() {
            document.getElementById('global-xp-val').innerText = globalData.xp;
            const l = document.getElementById('upgrade-list'); l.innerHTML = '';
            const items = [{id:'hp',n:'最大HP'},{id:'atk',n:'攻撃力'},{id:'spd',n:'速度'},{id:'reroll',n:'リロール'}];
            items.forEach(i => {
                const lv = globalData.upgrades[i.id] || 0, cost = (lv + 1) * 15;
                l.innerHTML += `<div class="list-item"><div><b>${i.n}</b> (Lv.${lv})</div><button class="btn" style="width:auto;padding:5px 15px;" ${globalData.xp>=cost?'':'disabled'} onclick="buyUp('${i.id}',${cost})">${cost}XP</button></div>`;
            });
        }
        function buyUp(id, c) { globalData.xp -= c; globalData.upgrades[id]++; saveData(); updateUpgradeUI(); }

        function startGame(type) {
            showScreen('game-screen');
            const pU = globalData.upgrades;
            gameState = {
                charType: type,
                player: { hp: 35 + pU.hp*5, maxHp: 35 + pU.hp*5, x: 400, y: 300, lv: 1, xp: 0, nextXp: 5, damage: 1.0 + pU.atk*0.1, attackInterval: Math.max(3, 12-pU.spd), lineWidth: 3, invincible: 0, durationBonus: 0 },
                enemies: [], effects: [], ineqEffects: [], enemyEffects: [],
                formulas: [{id:1, name: "スロット1", components: type==='eq'?[{name:"Circle",code:"CIRCLE"}]:[], variables: []}],
                frameCount: 0, rerollsLeft: 3 + pU.reroll, curse: globalData.curse, isPaused: false, isGameOver: false
            };
            document.getElementById('curse-val').innerText = gameState.curse;
            lastFrameTime = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }

        function returnToTitle() { cancelAnimationFrame(animationId); showScreen('title-screen'); }

        class Enemy {
            constructor(idx) {
                const a = Math.random()*Math.PI*2;
                this.x = gameState.player.x + Math.cos(a)*550; this.y = gameState.player.y + Math.sin(a)*550;
                this.idx = idx; this.n = idx+3; this.isBoss = false; this.hitFlash = 0; this.ineqCD = {};
                const m = 1 + gameState.curse*0.01;
                this.maxHp = (1 + idx*2) * m; this.hp = this.maxHp;
                this.speed = 1.0 + idx*0.1 + gameState.player.lv*0.05; this.size = 12 + idx*1.5; this.xp = 1 + idx;
            }
            update() {
                const d = Math.hypot(gameState.player.x-this.x, gameState.player.y-this.y);
                if(d>1){ this.x += (gameState.player.x-this.x)/d*this.speed; this.y += (gameState.player.y-this.y)/d*this.speed; }
                for(let k in this.ineqCD) if(this.ineqCD[k]>0) this.ineqCD[k]--;
            }
            draw() {
                ctx.fillStyle = this.hitFlash>0 ? "#fff" : `hsl(0, ${Math.min(80, 40+this.idx*5)}%, ${Math.max(30, 70-this.idx*5)}%)`;
                ctx.beginPath();
                for(let i=0; i<this.n; i++){ let a = -Math.PI/2+(Math.PI*2*i)/this.n; ctx.lineTo(this.x+Math.cos(a)*this.size, this.y+Math.sin(a)*this.size); }
                ctx.closePath(); ctx.fill(); ctx.strokeStyle="#844"; ctx.lineWidth=2; ctx.stroke();
                if(this.hitFlash>0) this.hitFlash--;
            }
        }

        class Boss extends Enemy {
            constructor(type, lv) {
                super(0); this.isBoss = true; this.bossType = type;
                this.n = type==='mid'?8:12; this.size = type==='mid'?35:50;
                const m = 1 + gameState.curse*0.01;
                this.maxHp = (type==='mid'?1000:2500)*m + lv*10; this.hp = this.maxHp;
                this.state = 'MOVE'; this.timer = 0;
            }
            update() {
                super.update();
                if(this.state==='MOVE') {
                    if(Math.hypot(this.x-gameState.player.x, this.y-gameState.player.y)<150) { this.state='ATTACK'; this.timer=30; }
                } else {
                    if(--this.timer<=0) { this.bossFire(); this.x = Math.random()*800; this.y=Math.random()*600; this.state='MOVE'; }
                }
            }
            bossFire() {
                const pts = [];
                for(let t=-400; t<=400; t+=5) {
                    let a = (t+400)*(Math.PI*2/800);
                    let r = this.bossType==='mid' ? Math.cos(4*a)*150 : 150;
                    pts.push({x: this.x + r*Math.cos(a), y: this.y + r*Math.sin(a) + Math.sin(t/20)*30});
                }
                gameState.enemyEffects.push({points:pts, life:30, hasHit:false});
            }
        }

        function gameLoop(ts) {
            if(gameState.isGameOver) return;
            animationId = requestAnimationFrame(gameLoop);
            if(gameState.isPaused || ts-lastFrameTime<16) return;
            lastFrameTime = ts;
            ctx.clearRect(0,0,800,600); gameState.frameCount++;

            // 敵出現
            const sr = Math.max(2, Math.floor((60 - gameState.player.lv) / (1 + gameState.curse*0.01)));
            if(gameState.frameCount % sr === 0) gameState.enemies.push(new Enemy(Math.min(5, Math.floor(gameState.fra
