<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>殺戮関数</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        /* touch-action: none でスマホ特有のスクロールやズームを完全防止し、負荷を下げる */
        body { 
            margin: 0; background: #e8e6da; color: #333; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; touch-action: none;
        }
        .screen { display: none; width: 100%; height: 100%; position: relative; padding: 20px; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        canvas { 
            background: #f4f2e8; border: 2px solid #888; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); 
            max-width: 100vw; max-height: 100vh; object-fit: contain; 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            touch-action: none;
        }
        
        .menu-container {
            width: 100%; max-width: 750px; background: #f4f2e8; border: 2px solid #888; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1); border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: auto;
        }
        
        h1.title-logo { font-size: clamp(32px, 10vw, 64px); margin: 0 0 20px 0; border-bottom: 4px dashed #888; padding-bottom: 10px; letter-spacing: 5px; text-align: center; }
        h2 { border-bottom: 2px dashed #888; padding-bottom: 10px; width: 100%; text-align: center; font-size: clamp(20px, 6vw, 24px); margin-top: 0;}
        
        .btn { display: block; width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; background: #f0eee4; border: 2px solid #888; color: #333; cursor: pointer; text-align: center; font-size: 16px; font-weight: bold; border-radius: 4px; appearance: none; }
        @media (hover: hover) { .btn:hover:not(:disabled) { background: #e0dec4; border-color: #333; } .option-btn:hover { background: #e0dec4; } }
        .btn:active:not(:disabled), .option-btn:active { background: #d0ceb4; transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .char-select-container { display: flex; gap: 15px; width: 100%; justify-content: center; flex-wrap: wrap; margin-bottom: 15px;}
        .char-card { flex: 1; min-width: 250px; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; }
        .char-card.eq { background: #fffdf5; border: 2px solid #ccc; }
        .char-card.ineq { background: #f0f8ff; border: 2px solid #a0c8e0; }
        .char-card h3 { text-align: center; margin: 0; font-size: 22px; }
        .char-card p { font-size: 13px; line-height: 1.5; flex-grow: 1; margin: 10px 0; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; margin-bottom: 5px; text-align: center; width: 100%; }

        .curse-container { background: #f0eee4; padding: 10px; border: 2px solid #888; border-radius: 8px; width: 100%; text-align: center; margin-bottom: 10px; }
        
        #game-ui { position: absolute; top: 10px; left: 10px; pointer-events: none; width: calc(100% - 20px); max-width: 320px; z-index: 10; background: rgba(244, 242, 232, 0.9); padding: 8px; border-radius: 8px; border: 1px solid rgba(136,136,136,0.5); max-height: 40vh; display: flex; flex-direction: column; }
        #ui-scroll-area { overflow-y: auto; pointer-events: auto; flex-grow: 1; margin-top: 5px; }
        .bar-container { width: 100%; height: 6px; background: #ddd; margin-bottom: 4px; border: 1px solid #888; }
        #hp-bar { height: 100%; background: #d66060; transition: width 0.2s; } 
        #xp-bar { height: 100%; background: #60d6a0; transition: width 0.2s; } 

        .list-container { width: 100%; flex-grow: 1; max-height: 40vh; overflow-y: auto; padding: 10px; border: 1px solid #ccc; background: #fffdf5; }
        .list-item { border-bottom: 1px dashed #ccc; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 14px; }
        
        .type-badge { display: inline-block; padding: 2px 5px; background: #90a0d0; color: #fff; font-size: 10px; margin-right: 5px; border-radius: 2px; font-weight: bold; }
        .type-badge.stat { background: #d0a060; } .type-badge.target { background: #80c090; } .type-badge.target-mod { background: #e09040; } .type-badge.base { background: #50a0a0; }
        
        #level-up-modal, #game-over-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fcfaf2; padding: 20px; border: 3px solid #666; display: none; text-align: center; pointer-events: auto; width: 95%; max-width: 400px; max-height: 90vh; overflow-y: auto; z-index: 100; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #f0eee4; border: 2px solid #888; color: #333; cursor: pointer; text-align: left; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="title-screen" class="screen active-screen">
        <div class="menu-container">
            <h1 class="title-logo">殺戮関数</h1>
            <button class="btn" onclick="showScreen('char-select-screen')">ゲームを始める</button>
            <button class="btn" onclick="showScreen('upgrade-screen'); updateUI();">自分の強化</button>
            <button class="btn" onclick="showScreen('encyclopedia-screen'); initDict('eq');">関数の図鑑</button>
        </div>
    </div>

    <div id="char-select-screen" class="screen">
        <div class="menu-container">
            <h2>出撃設定</h2>
            <div class="char-select-container">
                <div class="char-card eq">
                    <h3><span style="font-size:24px;">＝</span> 等号キャラ</h3>
                    <div class="badge" style="background:#e0e0e0; color:#333;">軌道描画・単体火力</div>
                    <p>数式の「線」を描画して攻撃します。一撃が重く、幾何学的な弾幕で敵を切り裂きます。</p>
                    <button class="btn" style="width:100%; margin:0;" onclick="startGame('eq')">出撃</button>
                </div>
                <div class="char-card ineq">
                    <h3 style="color:#285e8e;"><span style="font-size:24px;">＜</span> 不等号キャラ</h3>
                    <div class="badge" style="background:#cce0ff; color:#285e8e;">領域展開・持続制圧</div>
                    <p>数式の「面」で攻撃します。広範囲にダメージゾーンを作り、敵をじわじわと消滅させます。</p>
                    <button class="btn" style="width:100%; margin:0; background:#4a90e2; color:#fff; border-color:#357abd;" onclick="startGame('ineq')">出撃</button>
                </div>
            </div>
            <div class="curse-container">
                <div style="font-weight:bold; color:#503030;">💀 呪いレベル (0〜100)</div>
                <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin:5px 0;">
                    <button class="btn" style="width:40px; padding:8px; margin:0;" onclick="changeCurse(-10)">-10</button>
                    <span id="curse-disp" style="font-size:24px; font-weight:bold; width:50px;">0</span>
                    <button class="btn" style="width:40px; padding:8px; margin:0;" onclick="changeCurse(10)">+10</button>
                </div>
                <div style="font-size:11px; color:#666;">敵の強さと獲得XPが <span id="curse-eff">0</span>% 増加</div>
            </div>
            <button class="btn back-btn" style="margin-top:0;" onclick="showScreen('title-screen')">戻る</button>
        </div>
    </div>

    <div id="upgrade-screen" class="screen">
        <div class="menu-container">
            <h2>永続強化</h2>
            <div style="font-weight:bold; color:#8a6d50; margin-bottom:10px;">所持XP: <span id="g-xp-val">0</span></div>
            <div class="list-container" id="upgrade-list"></div>
            <button class="btn back-btn" onclick="showScreen('title-screen')">戻る</button>
        </div>
    </div>

    <div id="encyclopedia-screen" class="screen">
        <div class="menu-container">
            <h2>数式図鑑</h2>
            <div style="display:flex; gap:10px; width:100%; margin-bottom:10px;">
                <button class="btn" style="margin:0; padding:10px;" onclick="initDict('eq')">等号</button>
                <button class="btn" style="margin:0; padding:10px; background:#e0f0ff;" onclick="initDict('ineq')">不等号</button>
            </div>
            <div class="list-container" id="dict-list"></div>
            <button class="btn back-btn" onclick="showScreen('title-screen')">戻る</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="padding:0; overflow:hidden;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="game-ui">
            <div style="font-size:12px; font-weight:bold; margin-bottom:4px;">
                Lv:<span id="lv-val">1</span> | <span id="time-val">0:00</span> | 💀<span id="curse-val">0</span>
            </div>
            <div class="bar-container"><div id="hp-bar" style="width:100%"></div></div>
            <div class="bar-container"><div id="xp-bar" style="width:0%"></div></div>
            <div id="ui-scroll-area">
                <div id="stats-list" style="font-size:10px; font-weight:bold; color:#8a6d50; margin-bottom:4px;"></div>
                <div id="formula-list" style="font-size:10px; color:#444; border-top:1px solid #ccc; padding-top:4px;"></div>
            </div>
        </div>

        <div id="level-up-modal">
            <h2 id="modal-title" style="margin-top:0;">LEVEL UP!</h2>
            <div id="options"></div>
            <button id="reroll-btn" class="option-btn" style="background:#4a90e2; color:#fff; font-weight:bold; border-color:#357abd;">リロール</button>
        </div>

        <div id="game-over-modal">
            <h2 id="go-title" style="color:#d66; border:none;">GAME OVER</h2>
            <p id="result-stats" style="font-size:14px; line-height:1.8;"></p>
            <button class="btn" style="margin:20px auto 0;" onclick="returnToTitle()">タイトルへ</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let animationId, lastFrameTime = 0, pointerCoords = { x: 400, y: 300 };

        // 画面サイズの事前キャッシュ（スマホのレイアウト変更時の負荷軽減）
        let canvasRect = canvas.getBoundingClientRect();
        window.addEventListener('resize', () => canvasRect = canvas.getBoundingClientRect());

        function updatePointer(e) {
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            pointerCoords.x = (cx - canvasRect.left) * (800 / canvasRect.width);
            pointerCoords.y = (cy - canvasRect.top) * (600 / canvasRect.height);
        }
        window.addEventListener('mousemove', updatePointer);
        window.addEventListener('touchstart', updatePointer, {passive: false});
        window.addEventListener('touchmove', updatePointer, {passive: false});

        let gData = { xp: 0, curse: 0, upg: { hp: 0, atk: 0, spd: 0, reroll: 0 } };
        function loadData() { try { const s = localStorage.getItem('satsuriku-v3'); if (s) { const p = JSON.parse(s); gData.xp = p.xp||0; gData.curse = p.curse||0; Object.assign(gData.upg, p.upg||{}); } } catch(e) {} }
        function saveData() { localStorage.setItem('satsuriku-v3', JSON.stringify(gData)); }
        loadData();

        function showScreen(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active-screen', s.id === id)); 
            if(id === 'game-screen') setTimeout(() => canvasRect = canvas.getBoundingClientRect(), 100);
        }
        function changeCurse(v) { gData.curse = Math.max(0, Math.min(100, gData.curse + v)); saveData(); document.getElementById('curse-disp').innerText = gData.curse; document.getElementById('curse-eff').innerText = gData.curse; }
        changeCurse(0);

        const upEq = [
            { type: "variable", name: "最寄りの敵 (CLO)", code: "CLO" }, { type: "variable", name: "ランダム (RAN)", code: "RAN" },
            { type: "variable", name: "敵の重心 (AVG)", code: "AVG" }, { type: "variable", name: "ポインタ (PTR)", code: "PTR" },
            { type: "target_mod", name: "射出 (Launch)", code: "LAUNCH" },
            { type: "formula", name: "円 (Circle)", code: "CIRCLE" }, { type: "formula", name: "バラ (Rose)", code: "ROSE" },
            { type: "formula", name: "波 (sin)", code: "Math.sin(x/20)*40" }, { type: "formula", name: "絶対値波 (|sin|)", code: "Math.abs(Math.sin(x/30))*50" },
            { type: "formula", name: "放物線 (x²)", code: "(x*x)/200" }, { type: "formula", name: "Tangent (tan)", code: "TAN" },
            { type: "modifier", name: "反転 (d/dx)", code: "INVERT" }, { type: "modifier", name: "積分 (∫)", code: "INT" },
            { type: "modifier", name: "極限 (lim)", code: "LIM" }, { type: "modifier", name: "虚数 (i)", code: "IMG" }, { type: "modifier", name: "総和 (Σ)", code: "SIGMA" },
            { type: "stat", name: "威力増加", action: () => gameState.p.dmg += 0.2 }, { type: "stat", name: "描画速度UP", action: () => gameState.p.spd = Math.max(3, gameState.p.spd - 2) }, { type: "stat", name: "太さUP", action: () => gameState.p.lw += 2 }
        ];
        const upIneq = [
            { type: "variable", name: "最寄りの敵 (CLO)", code: "CLO" }, { type: "variable", name: "ポインタ (PTR)", code: "PTR" }, { type: "target_mod", name: "射出 (Launch)", code: "LAUNCH" },
            { type: "base", name: "下部領域", code: "BASE_LESS" }, { type: "base", name: "円形領域", code: "BASE_CIRCLE" },
            { type: "formula", name: "Sine 波面", code: "SIN_AREA" }, { type: "formula", name: "Noise 浸食", code: "NOISE_AREA" }, { type: "formula", name: "Step 階段", code: "STEP_AREA" },
            { type: "modifier", name: "NOT (反転)", code: "INVERT_INEQ" }, { type: "modifier", name: "帯域化 (Band)", code: "BAND_INEQ" }, { type: "modifier", name: "持続化 (Persist)", code: "PERSIST" },
            { type: "stat", name: "威力増加", action: () => gameState.p.dmg += 0.1 }, { type: "stat", name: "展開速度UP", action: () => gameState.p.spd = Math.max(5, gameState.p.spd - 2) }, { type: "stat", name: "持続時間UP", action: () => gameState.p.dur += 15 }
        ];

        function initDict(t) {
            const l = document.getElementById('dict-list'); l.innerHTML = '';
            (t === 'eq' ? upEq : upIneq).forEach(u => { if(u.type!=='stat') l.innerHTML += `<div class="list-item"><div><span class="type-badge ${u.type}">${u.type}</span><b>${u.name}</b></div></div>`; });
        }

        const pUpgs = [{id:'hp',n:'HP(+5)',b:10},{id:'atk',n:'ATK(+0.1)',b:15},{id:'spd',n:'SPD(-1F)',b:20},{id:'reroll',n:'REROLL',b:20}];
        function updateUI() {
            document.getElementById('g-xp-val').innerText = gData.xp;
            const l = document.getElementById('upgrade-list'); l.innerHTML = '';
            pUpgs.forEach(i => {
                const lv = gData.upg[i.id] || 0, c = i.b * (lv + 1);
                l.innerHTML += `<div class="list-item"><div><b>${i.n}</b> (Lv.${lv})</div><button class="btn" style="width:auto;padding:6px 12px;margin:0;" ${gData.xp>=c?'':'disabled'} onclick="buyUp('${i.id}',${c})">${c}XP</button></div>`;
            });
        }
        function buyUp(id, c) { gData.xp -= c; gData.upg[id] = (gData.upg[id]||0)+1; saveData(); updateUI(); }

        let gameState = {};

        function startGame(type) {
            loadData(); showScreen('game-screen');
            const u = gData.upg;
            gameState = {
                type, frame: 0, pause: false, over: false, rrl: 3 + (u.reroll||0), curse: gData.curse||0,
                p: { hp: 35+(u.hp||0)*5, maxHp: 35+(u.hp||0)*5, x: 400, y: 300, lv: 1, xp: 0, nx: 5, dmg: 1.0+(u.atk||0)*0.1, spd: Math.max(3, 12-(u.spd||0)), lw: 3, inv: 0, dur: 0 },
                ens: [], efs: [], ineqs: [], bEfs: [],
                forms: [{ id:1, n: type==='eq'?"スロット1":"領域1", c: type==='eq'?[{name:"Circle",code:"CIRCLE"}]:[], v: [] }]
            };
            document.getElementById('curse-val').innerText = gameState.curse;
            lastFrameTime = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }

        class Enemy {
            constructor(idx) {
                const a = Math.random()*Math.PI*2;
                this.x = 400 + Math.cos(a)*550; this.y = 300 + Math.sin(a)*550;
                this.dead = false; this.isBoss = false; this.hitF = 0; this.cd = {}; this.n = idx+3;
                this.maxHp = Math.floor((1+idx*2)*(1+gameState.curse*0.01)); this.hp = this.maxHp;
                this.spd = 1.0 + idx*0.1 + gameState.p.lv*0.05; this.sz = 12 + idx*1.5; this.xp = 1 + idx;
                this.col = `hsl(0, ${Math.min(80, 40+idx*5)}%, ${Math.max(30, 70-idx*5)}%)`;
            }
            update() {
                const d = Math.hypot(gameState.p.x-this.x, gameState.p.y-this.y);
                if(d>1){ this.x+=(gameState.p.x-this.x)/d*this.spd; this.y+=(gameState.p.y-this.y)/d*this.spd; }
                for(let k in this.cd) if(this.cd[k]>0) this.cd[k]--;
            }
            draw() {
                ctx.fillStyle = this.hitF>0 ? "#fff" : this.col; ctx.beginPath();
                for(let i=0; i<this.n; i++){ let a=-Math.PI/2+(Math.PI*2*i)/this.n; ctx.lineTo(this.x+Math.cos(a)*this.sz, this.y+Math.sin(a)*this.sz); }
                ctx.closePath(); ctx.fill(); ctx.strokeStyle="#844"; ctx.lineWidth=2; ctx.stroke();
                if(this.maxHp>1){ ctx.fillStyle="#844"; ctx.fillRect(this.x-12,this.y-this.sz-10,24,4); ctx.fillStyle="#f33"; ctx.fillRect(this.x-12,this.y-this.sz-10,24*(this.hp/this.maxHp),4); }
                if(this.hitF>0) this.hitF--;
            }
        }

        class Boss extends Enemy {
            constructor(type, lv) {
                super(0); this.isBoss=true; this.bType=type; this.n=type==='mid'?8:12; this.sz=type==='mid'?35:50;
                this.maxHp = Math.floor((type==='mid'?1000:2500)*(1+gameState.curse*0.01) + lv*15); this.hp=this.maxHp;
                this.state = 'MOVE'; this.tmr = 0; this.xp = type==='mid'?300:0;
            }
            update() {
                super.update();
                if(this.state==='MOVE') { if(Math.hypot(this.x-gameState.p.x, this.y-gameState.p.y)<150) { this.state='ATK'; this.tmr=30; } } 
                else {
                    if(--this.tmr<=0) {
                        const pts=[]; for(let t=-400;t<=400;t+=4){ let a=(t+400)*(Math.PI*2/800), r=this.bType==='mid'?Math.cos(4*a)*150:150; pts.push({x:this.x+r*Math.cos(a), y:this.y+r*Math.sin(a)+Math.sin(t/20)*30}); }
                        gameState.bEfs.push({pts, life:30, dead:false});
                        this.x = Math.random()*800; this.y = Math.random()*600; this.state='MOVE';
                    }
                }
            }
            draw() { if(this.state==='ATK'){ctx.beginPath();ctx.arc(this.x,this.y,this.sz*1.5,0,Math.PI*2);ctx.fillStyle="rgba(255,100,100,0.3)";ctx.fill();} super.draw(); }
        }

        function getTarget(c) {
            let trgs = gameState.ens.filter(e=>!e.dead);
            if(!trgs.length) return null;
            if(c==='CLO') return trgs.reduce((p,c)=>Math.hypot(p.x-gameState.p.x,p.y-gameState.p.y)<Math.hypot(c.x-gameState.p.x,c.y-gameState.p.y)?p:c);
            if(c==='RAN') return trgs[Math.floor(Math.random()*trgs.length)];
            if(c==='AVG') { let sx=0,sy=0; trgs.forEach(e=>{sx+=e.x;sy+=e.y;}); return {x:sx/trgs.length, y:sy/trgs.length}; }
            return null;
        }

        function gameLoop(ts) {
            if(gameState.over) return; animationId = requestAnimationFrame(gameLoop);
            // 60Hzデバイスで16msにするとコマ落ちするため15msで調整 (120Hz対応)
            if(gameState.pause || ts-lastFrameTime<15) return; lastFrameTime = ts;
            ctx.clearRect(0,0,800,600); gameState.frame++;
            
            let rate = Math.max(2, Math.floor(Math.max(10, 60-gameState.p.lv*1.5)/(1+gameState.curse*0.01)));
            if(gameState.frame % rate === 0) gameState.ens.push(new Enemy(Math.min(5, Math.floor(gameState.frame/3600))));
            if(gameState.frame === 18000) gameState.ens.push(new Boss('mid', gameState.p.lv));
            if(gameState.frame === 36000) gameState.ens.push(new Boss('last', gameState.p.lv));

            processAttacks();

            gameState.ens.forEach(e => { e.update(); e.draw(); });

            handleIneqs(); handleEqs(); handleBossEfs();

            gameState.ens.forEach(e => {
                if(!e.dead && Math.hypot(e.x-gameState.p.x, e.y-gameState.p.y) < e.sz+12) {
                    if(gameState.p.inv<=0) { gameState.p.hp--; gameState.p.inv=45; }
                    if(!e.isBoss) e.dead = true;
                }
            });

            gameState.ens = gameState.ens.filter(e => !e.dead);
            gameState.efs = gameState.efs.filter(e => !e.dead);
            gameState.ineqs = gameState.ineqs.filter(e => !e.dead);
            gameState.bEfs = gameState.bEfs.filter(e => !e.dead);

            if(gameState.p.inv>0) gameState.p.inv--;
            updateHUD();
            
            if(gameState.p.inv%10<5){ ctx.fillStyle="#333"; ctx.beginPath(); ctx.arc(gameState.p.x, gameState.p.y, 13, 0, Math.PI*2); ctx.fill(); }
            if(gameState.p.hp<=0) endGame(false);
        }

        function processAttacks() {
            const T = gameState.frame, p = gameState.p;
            gameState.forms.forEach(f => {
                let iC = f.c.filter(c=>c.code==='INT').length;
                if(T % (p.spd + (gameState.type==='eq'?iC*15:0)) !== 0) return;
                
                let t=null; if(f.v.length) { t = f.v[0].code==='PTR' ? pointerCoords : getTarget(f.v[0].code); }
                let st={x:p.x, y:p.y}, ed=t?{x:t.x,y:t.y}:st, hV=f.c.some(c=>c.code==='LAUNCH');
                if(!hV) st=ed;

                if(gameState.type==='eq') {
                    let pts=[], isC=f.c.some(c=>c.code==='CIRCLE'), rC=f.c.filter(c=>c.code==='ROSE').length;
                    
                    // 【スマホ負荷対策】ループ外で関数をコンパイル
                    let compiledFns = [];
                    for(let c of f.c) {
                        if(['CIRCLE','ROSE','INVERT','TAN','INT','LIM','IMG','SIGMA','LAUNCH'].includes(c.code)) continue;
                        try { compiledFns.push(new Function('x','T','return '+c.code)); } catch(e){}
                    }

                    for(let x=-400; x<=400; x+=4){
                        let lx=x, ly=0;
                        if(rC>0){ let a=(x+400)*(Math.PI*2/800), r=Math.cos((2+rC*2)*a)*100; lx=r*Math.cos(a); ly=r*Math.sin(a); }
                        else if(isC){ let a=(x+400)*(Math.PI*2/800); lx=Math.cos(a)*80; ly=Math.sin(a)*80; }
                        
                        // コンパイル済みの関数を実行（スマホ爆速化）
                        for(let fn of compiledFns) { try { ly += fn(lx, T); } catch(e){} }
                        
                        if(f.c.some(c=>c.code==='TAN')){ let tv=Math.tan(x/20)*40; lx+=Math.max(-800,Math.min(800,tv)); }
                        if(f.c.length%2 && f.c.some(c=>c.code==='INVERT')) ly=-ly;
                        pts.push({lx, ly:-ly});
                    }
                    let mLife=12+iC*4;
                    gameState.efs.push({pts, life:mLife, max:mLife, lw:p.lw+iC*5, st, ed, hV, dmg:p.dmg*(1+iC*0.5), hit:new Set(), dead:false});
                } else {
                    let pts=[], bs=f.c.some(c=>c.code==='BASE_CIRCLE')?'CIRCLE':'GREATER';
                    if(bs==='CIRCLE'){
                        for(let t=0; t<=Math.PI*2+0.1; t+=0.1){
                            let y=0; for(let c of f.c){ if(c.code==='SIN_AREA')y+=Math.sin(t*10+T/10)*30; }
                            pts.push({lx: (150+y)*Math.cos(t), ly: -(150+y)*Math.sin(t)});
                        }
                    } else {
                        for(let x=-400; x<=400; x+=10){
                            let y=0; for(let c of f.c){
                                if(c.code==='SIN_AREA')y+=Math.sin(x/20+T/10)*30;
                                else if(c.code==='STEP_AREA')y+=Math.floor((x+T*2)/60)*30;
                                else if(c.code==='NOISE_AREA'){let n=Math.sin(x*12+T*.1)*43758; y+=(n%1)*50;}
                            }
                            pts.push({lx: x, ly: -Math.max(-1000,Math.min(1000,y))});
                        }
                    }
                    let mLife=10+f.c.filter(c=>c.code==='PERSIST').length*45+p.dur;
                    gameState.ineqs.push({id:Math.random(), pts, bs, st, ed, hV, life:mLife, max:mLife, dmg:p.dmg*0.4, isB:f.c.some(c=>c.code==='BAND_INEQ'), inv:f.c.filter(c=>c.code==='INVERT_INEQ').length%2!==0, dead:false});
                }
            });
        }

        function dealDamage(e, d) {
            e.hp -= d; e.hitF = 3;
            if(e.hp <= 0 && !e.dead) {
                e.dead = true; gameState.p.xp += e.xp;
                if(gameState.p.xp >= gameState.p.nx) levelUp();
                if(e.isBoss && e.bType==='last') endGame(true);
            }
        }

        function handleEqs() {
            gameState.efs.forEach(ef => {
                let prg = ef.hV ? 1-(ef.life/ef.max) : 1, cx=ef.st.x+(ef.ed.x-ef.st.x)*prg, cy=ef.st.y+(ef.ed.y-ef.st.y)*prg;
                let wP = ef.pts.map(p=>({x:p.lx+cx, y:p.ly+cy}));
                ctx.strokeStyle=`rgba(60,60,60,${ef.life/ef.max})`; ctx.lineWidth=ef.lw; ctx.beginPath();
                wP.forEach((p,j)=>j===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
                
                if(ef.hV || ef.life===ef.max) {
                    gameState.ens.forEach(e => {
                        if(!e.dead && !ef.hit.has(e) && wP.some(p=>Math.hypot(e.x-p.x,e.y-p.y)<e.sz+ef.lw)){ ef.hit.add(e); dealDamage(e, ef.dmg); }
                    });
                }
                if(--ef.life<=0) ef.dead=true;
            });
        }

        function handleIneqs() {
            gameState.ineqs.forEach(ef => {
                let prg = ef.hV ? 1-(ef.life/ef.max) : 1, cx=ef.st.x+(ef.ed.x-ef.st.x)*prg, cy=ef.st.y+(ef.ed.y-ef.st.y)*prg;
                ctx.fillStyle=`rgba(100,160,200,${(ef.life/ef.max)*0.4})`; ctx.beginPath();
                ef.pts.forEach((p,j)=>j===0?ctx.moveTo(p.lx+cx,p.ly+cy):ctx.lineTo(p.lx+cx,p.ly+cy));
                if(ef.bs!=='CIRCLE'){ ctx.lineTo(ef.pts[ef.pts.length-1].lx+cx, 1600); ctx.lineTo(ef.pts[0].lx+cx, 1600); }
                ctx.fill();

                gameState.ens.forEach(e => {
                    if(!e.dead && !e.cd[ef.id]) {
                        if(Math.hypot(e.x-cx, e.y-cy) < 150) { 
                            dealDamage(e, ef.dmg); e.cd[ef.id]=10;
                        }
                    }
                });
                if(--ef.life<=0) ef.dead=true;
            });
        }

        function handleBossEfs() {
            gameState.bEfs.forEach(ef => {
                ctx.strokeStyle=`rgba(200,50,50,${ef.life/30})`; ctx.lineWidth=4; ctx.beginPath();
                ef.pts.forEach((p,j)=>j===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
                if(!ef.hasHit && ef.pts.some(p=>Math.hypot(p.x-gameState.p.x, p.y-gameState.p.y)<15)) { gameState.p.hp-=5; ef.hasHit=true; }
                if(--ef.life<=0) ef.dead=true;
            });
        }

        function updateHUD() {
            document.getElementById('hp-bar').style.width = (gameState.p.hp/gameState.p.maxHp*100)+'%';
            document.getElementById('xp-bar').style.width = (gameState.p.xp/gameState.p.nx*100)+'%';
            document.getElementById('lv-val').innerText = gameState.p.lv;
            let s = Math.floor(gameState.frame/60); document.getElementById('time-val').innerText = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
            document.getElementById('stats-list').innerText = `HP:${gameState.p.hp}/${gameState.p.maxHp} | ATK:${gameState.p.dmg.toFixed(1)} | SPD:${(60/gameState.p.spd).toFixed(1)}/s`;
            document.getElementById('formula-list').innerHTML = gameState.forms.map(f=>`[${f.n}] 📍${f.v[0]?.name||'自'} <br>└ ${f.c.map(c=>c.name).join('+')||'無'}`).join('<br>');
        }

        function levelUp() {
            gameState.pause = true; document.getElementById('level-up-modal').style.display='block';
            if(gameState.p.lv%10===0) gameState.forms.push({id:gameState.forms.length+1, n:gameState.type==='eq'?"スロット":"領域", c:[], v:[]});
            rollOptions();
        }

        function rollOptions() {
            const o = document.getElementById('options'); o.innerHTML = '';
            const p = gameState.type==='eq'?upEq:upIneq;
            p.sort(()=>0.5-Math.random()).slice(0,3).forEach(c => {
                const b = document.createElement('button'); b.className='option-btn'; b.innerHTML=`<b>${c.name}</b><br><small>${c.desc||''}</small>`;
                b.onclick = () => {
                    if(c.type==='stat') c.action(); else if(gameState.forms.length>1) { showSlotSelect(c); return; }
                    else { if(c.type==='variable') gameState.forms[0].v=[c]; else gameState.forms[0].c.push(c); }
                    closeModal();
                }; o.appendChild(b);
            });
            const r = document.getElementById('reroll-btn'); r.style.display='block'; r.innerText=`リロール (残${gameState.rrl})`;
            r.onclick = () => { if(gameState.rrl>0){gameState.rrl--; rollOptions();} };
        }

        function showSlotSelect(i) {
            const o = document.getElementById('options'); o.innerHTML = '<div style="margin-bottom:10px;font-weight:bold;">追加先を選択:</div>';
            gameState.forms.forEach(f => {
                const b = document.createElement('button'); b.className='option-btn'; b.innerHTML=`<b>${f.n}</b> (現在: ${f.c.length}要素)`;
                b.onclick = () => { if(i.type==='variable') f.v=[i]; else f.c.push(i); closeModal(); }; o.appendChild(b);
            });
            document.getElementById('reroll-btn').style.display='none';
        }
        function closeModal() { document.getElementById('level-up-modal').style.display='none'; gameState.pause=false; lastFrameTime=performance.now(); }

        function endGame(w) {
            gameState.over = true; document.getElementById('game-over-modal').style.display='block';
            const s = Math.floor(gameState.frame/60), x = Math.floor((s + gameState.p.lv*5)*(w?2:1)*(1+gameState.curse*0.01));
            gData.xp += x; saveData(); updateUpgradeUI();
            document.getElementById('go-title').innerText = w ? "GAME CLEAR!" : "GAME OVER";
            document.getElementById('go-title').style.color = w ? "#da6" : "#d66";
            document.getElementById('result-stats').innerHTML = `生存: ${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}<br>到達: Lv.${gameState.p.lv}<br><br><b>獲得XP: +${x}</b>`;
        }

        window.returnToTitle = returnToTitle;
    </script>
</body>
